name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Docs
        run: cargo rustdoc -- -D missing_docs

      - name: Test (std)
        run: cargo test

      - name: Test (std + serde)
        run: cargo test --features serde

      - name: Build (alloc only)
        run: cargo build --no-default-features --features alloc

      - name: Build (no_std)
        run: cargo build --no-default-features

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-coverage-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-coverage-

      - name: Check coverage
        run: |
          LINES=$(cargo llvm-cov --json --summary-only \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['data'][0]['totals']['lines']['percent'])")
          BASELINE=$(cat .coverage-baseline)
          echo "Coverage: ${LINES}%  Baseline: ${BASELINE}%"
          python3 -c "import sys; sys.exit(0 if float('$LINES') >= float('$BASELINE') - 0.1 else 1)" \
            || { echo "Coverage dropped below baseline"; exit 1; }
